# ---------------------------------------
# Module: jmx
# Enables local JMX support for Jetty components.
#
# Only local JMX is enabled by default (jconsole/jattach via the JVM
# attach socket). Remote JMX (jmx-remote) is deliberately NOT enabled:
# it opens an RMI registry listener that must be bound to localhost
# and gated behind TLS + auth before exposure.
#
# If remote JMX becomes necessary for the CloudWatch/observability
# pipeline, create a jmx-remote.ini alongside this file with:
#   --module=jmx-remote
#   jetty.jmxremote.rmiregistryhost=127.0.0.1
#   jetty.jmxremote.rmiserverhost=127.0.0.1
#   jetty.jmxremote.rmiregistryport=1099
#   jetty.jmxremote.rmiserverport=1099
# and restrict the port with the firewall / security group.
# ---------------------------------------
--module=jmx
