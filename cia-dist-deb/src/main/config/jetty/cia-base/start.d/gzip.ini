# ---------------------------------------
# Module: compression-gzip
# Enables the GZIP compression algorithm in CompressionHandler.
# (Replaces the deprecated "gzip" module from Jetty 12.1.)
#
# Note on HTTP methods:
# The legacy GzipHandler was explicitly configured with
#   jetty.gzip.includedMethodList=GET,POST
# In Jetty 12.1 the new CompressionHandler/CompressionConfig already
# sets GET and POST as the default compress-include methods via
# CompressionConfig.Builder.defaults(). That is, runtime behaviour
# for method selection is preserved; the old property has no 1:1
# ini-template equivalent and is not needed. If a different method
# set is ever required it must be configured in an override XML file
# against org.eclipse.jetty.compression.server.CompressionConfig.
#
# Note on MIME coverage (Vaadin):
# CompressionConfig.Builder.defaults() already covers text/*,
# application/json, application/xml, application/javascript, and
# application/*+json / application/*+xml via pattern matching, so
# Vaadin UIDL (application/json) and JavaScript bundles are gzipped
# out of the box. If ever serving legacy Vaadin clients that send
# application/vnd.vaadin+json, drop an override XML in
# cia-base/etc/jetty-cia-compression.xml that rebuilds the config
# via CompressionConfig.builder().defaults().compressIncludeMimeType(...)
# and registers it with the CompressionHandler for path "/".
#
# Note on Brotli / Zstandard:
# Jetty 12.1 also ships compression-brotli and compression-zstandard
# modules (~20% better ratio than gzip on text). Both require native
# libraries (brotli / zstd-jni) bundled as jars under lib/compression.
# They can be layered on top of compression-gzip by adding a sibling
# brotli.ini / zstandard.ini with --module=compression-brotli /
# --module=compression-zstandard. Disabled by default here to keep
# the deb dependency-free.
# ---------------------------------------
--module=compression-gzip

## Minimum content length after which gzip compression is enabled
# jetty.compression.gzip.minCompressSize=32

## Inflater pool max size (-1 for unlimited, 0 for no pooling)
# jetty.compression.gzip.inflaterPool.capacity=1024

## Deflater pool max size (-1 for unlimited, 0 for no pooling)
# jetty.compression.gzip.deflaterPool.capacity=1024

## Deflater pool default compression level (-1 for default)
# jetty.compression.gzip.deflaterPool.compressionLevel=-1
