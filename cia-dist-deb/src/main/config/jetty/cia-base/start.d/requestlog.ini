# ---------------------------------------
# Module: requestlog-slf4j
# Logs HTTP requests using CustomRequestLog + Slf4jRequestLogWriter.
#
# Emits each request at INFO level on SLF4J logger
# "org.eclipse.jetty.server.RequestLog", which is handled by the
# application's Logback configuration. The existing CloudWatch
# Logback appender (cloudwatchlogbackappender) therefore ships
# request logs to CloudWatch via the same path as application logs,
# with NO extra file on disk to rotate or pick up separately.
#
# If ops need a local on-disk copy, switch to "--module=requestlog"
# and set jetty.requestlog.filePath explicitly (and include that file
# in the log-shipping pipeline).
# ---------------------------------------
--module=requestlog-slf4j

## SLF4J Logger name for request log
# jetty.requestlog.slf4j.loggerName=org.eclipse.jetty.server.RequestLog

## NCSA extended format with response time in microseconds (%D)
## and user-agent / referer for traffic analysis.
jetty.requestlog.formatString=%{client}a - %u %{dd/MMM/yyyy:HH:mm:ss ZZZ|GMT}t "%r" %s %O %D "%{Referer}i" "%{User-Agent}i"
