# ---------------------------------------
# Module: requestlog
# Logs HTTP requests using CustomRequestLog + AsyncRequestLogWriter.
# Output is picked up by logback (console-capture + logging-logback)
# and forwarded to CloudWatch via USE_LOG_APPENDER in /etc/default/cia.
# ---------------------------------------
--module=requestlog

## NCSA extended format with response time in microseconds (%D)
## and user-agent / referer for traffic analysis.
jetty.requestlog.formatString=%{client}a - %u %{dd/MMM/yyyy:HH:mm:ss ZZZ|GMT}t "%r" %s %O %D "%{Referer}i" "%{User-Agent}i"

## Logging directory (relative to $JETTY_BASE -> /opt/cia/cia-base/logs)
# jetty.requestlog.dir=logs

## File path
# jetty.requestlog.filePath=${jetty.requestlog.dir}/yyyy_mm_dd.request.log

## How many days to retain old log files
jetty.requestlog.retainDays=30

## Whether to append to existing file
jetty.requestlog.append=true

## Timezone of the log file rollover
# jetty.requestlog.rollover.timezone=GMT
