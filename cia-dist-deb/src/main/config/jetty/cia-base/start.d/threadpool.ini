# ---------------------------------------
# Module: threadpool
# Enables and configures the Server ThreadPool.
#
# Tuned for the CIA application:
#   * -Xmx4096m heap
#   * Vaadin Push/Atmosphere long-poll sessions
#   * Bursty Riksdagen / ESV ingestion jobs
#
# QueuedThreadPool RAM footprint @ default 256k stack is ~100MB for 400
# threads, well below the 4GB heap.
# ---------------------------------------
--module=threadpool

## Minimum number of pooled threads.
jetty.threadPool.minThreads=20

## Maximum number of pooled threads.
jetty.threadPool.maxThreads=400

## Number of reserved threads (-1 for heuristic).
jetty.threadPool.reservedThreads=8

## Thread idle timeout (in milliseconds).
jetty.threadPool.idleTimeout=60000

## Whether to output a detailed dump.
#jetty.threadPool.detailedDump=false
